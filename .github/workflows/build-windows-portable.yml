name: Build Windows portable

on:
  workflow_dispatch:
  push:
    branches: [main, mi-rama-recuperada]
    tags:
      - "v*"
    paths:
      - "webui/**"
      - "org_multimedia/**"
      - "packaging/**"
      - "scripts/fetch-ffmpeg-windows.ps1"
      - "GaleriaAYN.spec"
      - "requirements.txt"
      - ".github/workflows/build-windows-portable.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Build webui
        working-directory: webui
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pywebview -r requirements.txt

      - name: PyInstaller
        run: python -m PyInstaller --clean --noconfirm GaleriaAYN.spec

      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          ./scripts/fetch-ffmpeg-windows.ps1
          New-Item -ItemType Directory -Force -Path dist/GaleriaAYN/tools/ffmpeg | Out-Null
          Copy-Item -Force tools/ffmpeg/ffmpeg.exe dist/GaleriaAYN/tools/ffmpeg/
          Copy-Item -Force tools/ffmpeg/ffprobe.exe dist/GaleriaAYN/tools/ffmpeg/
          if (Test-Path tools/ffmpeg/licenses) {
            Copy-Item -Force -Recurse tools/ffmpeg/licenses dist/GaleriaAYN/tools/ffmpeg/
          }
          ./scripts/copy-portable-legal.ps1 -PortableDir dist/GaleriaAYN

      - name: Zip portable folder
        id: zip
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $zipName = "GaleriaAYN-$tag-portable.zip"
          } else {
            $zipName = "GaleriaAYN-portable.zip"
          }
          $zipPath = Join-Path "dist" $zipName
          Compress-Archive -Path dist/GaleriaAYN/* -DestinationPath $zipPath -Force
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: GaleriaAYN-windows-portable
          path: ${{ steps.zip.outputs.zip_path }}
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zip_path }}
          generate_release_notes: true
          body: |
            ## Galería AYN — portable Windows (x64)

            Descarga **`${{ steps.zip.outputs.zip_name }}`**, extrae **toda la carpeta** y ejecuta `GaleriaAYN.exe`.

            Requisitos en el PC destino: Windows 10/11 64 bits, WebView2 y .NET Framework 4.7.2+.
            Si el zip viene de internet: Propiedades → **Desbloquear** antes de extraer.

            Guía completa: [docs/windows-portable.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/windows-portable.md)
